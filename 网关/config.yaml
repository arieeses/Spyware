# ============================================================
# sub-gateway 生产配置(已把 insider_feed / 面板名 / 按面板日志 填好)
# 剩下标 ★TODO 的是"只有你知道"的部署信息, 替换后即可上线。
# ============================================================

server:
  # ★TODO 监听地址。两种部署二选一:
  #   A) 网关在 Nginx/CDN 后面(推荐): 网关只监听本机, Nginx 转发过来
  #   B) 网关直接对外(自己终止 TLS): listen: "0.0.0.0:443" + tls.enabled: true + 证书
  listen: "127.0.0.1:1919"

  # 生产必开: 只信任 trusted_proxies 来的请求, 其它直连一律 403
  reject_direct_access: true

  origin_timeout_seconds: 10
  max_origin_response_bytes: 5242880
  allowed_methods: ["GET", "HEAD"]

  tls:
    # 部署 A(Nginx 终止 TLS)填 false; 部署 B(网关自己终止)填 true 并给证书
    enabled: false
    # cert_path: "/etc/ssl/gateway/fullchain.pem"
    # key_path:  "/etc/ssl/gateway/privkey.pem"

  internal_listen: "127.0.0.1:8081"
  # ★TODO 换成长随机串(生成: openssl rand -hex 24)
  reload_token: "CHANGE_ME_RANDOM_HEX"

# ★TODO 可信代理来源。部署 A 填你的 Nginx/CDN 出口 IP(单 IP 或 CIDR);
#        网关和 Nginx 同机就填 127.0.0.1
trusted_proxies:
  - "127.0.0.1"

origin_failure_mode: "fake"

rate_limit:
  enabled: true
  requests_per_minute: 120
  burst: 40

fake_latency:
  enabled: true        # 生产开启, 抗时序探测
  min_ms: 80
  max_ms: 300

private_ip_decision: "fake"

# 访问日志按面板分文件夹: logs/<面板名>/access-YYYY-MM-DD.log
#   面板名 = origins.<host>.name。查某面板拦截: grep '"decision":"fake"' logs/彩虹云/access-*.log
access_log:
  dir: "./data"        # 开启; 留空则只打 stdout
  stdout: true         # 是否同时打 stdout(给 pm2/journald); 想只落文件设 false

# 源站路由表: 网关对外域名(Host) -> 机场。
#   name       = 面板名(用于按面板分日志文件夹, 请核对下面推断是否正确)
#   base_url   = 该机场真实订阅源站
#   decoy_host = 命中风险时转发的诱饵机(可用但牺牲的订阅)
origins:
  chspy.osone.top:
    name: "ch"
    tenant_id: "ch"
    base_url: "https://blog.cauu.top"
    decoy_host: "chch.vvoocc.top"
  fnspy.osone.top:
    name: "fn"
    tenant_id: "fn"
    base_url: "https://blog.fnyok.com"
    decoy_host: "fnfn.vvoocc.top"
  knspy.osone.top:
    name: "kn"
    tenant_id: "kn"
    base_url: "https://blog.bnkn.cc"
    decoy_host: "knkn.vvoocc.top"
  lyspy.osone.top:
    name: "ly"
    tenant_id: "ly"
    base_url: "https://ep.0318.cyou"
    decoy_host: "lyly.vvoocc.top"
  qcspy.osone.top:
    name: "qc"
    tenant_id: "qc"
    base_url: "https://blog.senev1818.com"
    decoy_host: "qcqc.vvoocc.top"
  uyspy.osone.top:
    name: "uy"
    tenant_id: "uy"
