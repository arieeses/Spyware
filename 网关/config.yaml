  respy.osone.top:
    name: "re"
    tenant_id: "re"
    base_url: "https://blog.rocket8888.com"
    decoy_host: "rere.vvoocc.top"
  # ★TODO Gear 机场若也走这个网关, 照上面格式补一段(name/base_url/decoy_host)

# 白名单: ip/cidr/asn 任一命中永远真订阅。注意: 自有IP/UA 已由 spyware feed
# 下发(自动放行), 这里一般留空; 只在你想额外放行、又不进面板时才填。
allowlist:
  ips: []
  cidrs: []
  asns: []

cloud_detection:
  geoip:
    enabled: true
    # ★TODO 放一个 GeoLite2-ASN.mmdb 到这个路径(spyware 设置页也能下)
    db_path: "./data/GeoLite2-ASN.mmdb"
    block_asns:
      - 16509      # Amazon AWS
      - 8075       # Microsoft
      - 15169      # Google
      - 45102      # Alibaba
      - 132203     # Tencent
      - 135377     # UCloud
    block_asn_keywords:
      - "Alibaba"
      - "Aliyun"
      - "Amazon"
      - "AWS"
      - "Microsoft"
      - "Azure"
      - "Google"
      - "GCP"
      - "Tencent"
      - "Oracle"
      - "DigitalOcean"
      - "Linode"
      - "Hetzner"
      - "Vultr"
      - "OVH"
      - "UCloud"
  cidr:
    enabled: true
    files:
      - "./data/cloud_ipv4.txt"
      - "./data/cloud_ipv6.txt"

# 内鬼 Feed —— 已按你的面板填好, 直接用
insider_feed:
  enabled: true
  url: "https://solo.clavin.top/api/gateway_feed"
  key: "0840065fc07b28260072ae302a1bade0"
  interval_seconds: 30      # 初始值; 之后自动跟随面板「网关轮询间隔」
  timeout_seconds: 5

fake_subscription:
  real_userinfo:
    enabled: true           # 生产开启: 假节点但到期/流量为真, 更难被察觉
    cache_ttl_seconds: 300
    timeout_seconds: 5
  userinfo:                 # 拿不到真实 userinfo 时的兜底
    upload: 123456789
    download: 987654321
    total: 107374182400
    expire: 0
  profile_update_interval: 24
  filename: "subscribe"

# ★TODO 假节点: 填几个"看起来正常但全是假地址/假凭据"的节点(别填真源站)
fake_nodes:
  - name: "香港 01"
    type: "vmess"
    host: "hk1.example.com"
    port: 443
    uuid: "00000000-0000-0000-0000-000000000000"
    network: "ws"
    tls: true
    sni: "hk1.example.com"
    path: "/ws"
    host_header: "hk1.example.com"
  - name: "日本 01"
    type: "trojan"
    host: "jp1.example.com"
    port: 443
    password: "fake-password"
    network: "tcp"
    tls: true
    sni: "jp1.example.com"
    allow_insecure: false
  - name: "新加坡 01"
    type: "shadowsocks"
    host: "sg1.example.com"
    port: 443
    cipher: "aes-128-gcm"
    password: "fake-password"
    network: "tcp"
